name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Production deploy (merge to main) ─────────────────────
      - name: Deploy to Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          DEPLOY_URL=$(vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "✅ Production: $DEPLOY_URL"

      # ── Preview deploy (every PR) ──────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          PREVIEW_URL=$(vercel --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "🔍 Preview: $PREVIEW_URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🚀 Preview Deployment Ready',
                '',
                `**URL:** ${previewUrl}`,
                '',
                `**Branch:** \`${context.payload.pull_request.head.ref}\``,
                `**Commit:** ${context.payload.pull_request.head.sha.slice(0, 7)}`,
              ].join('\n')
            });
