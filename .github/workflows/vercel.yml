name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN secret is missing."
            echo "::error::Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: VERCEL_TOKEN  |  Value: your token from vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN is set"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Resolve Vercel org + project IDs via REST API ─────────
      # This avoids interactive 'vercel link' prompts entirely.
      # The API creates the project on first run; subsequent runs reuse it.
      - name: Resolve Vercel org and project
        id: vercel_ids
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          # Get personal user ID (used as VERCEL_ORG_ID for personal accounts)
          USER_JSON=$(curl -sf "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          ORG_ID=$(echo "$USER_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['user']['id'])")
          USERNAME=$(echo "$USER_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['user']['username'])")
          echo "Account: $USERNAME  (org_id: $ORG_ID)"

          # Try to fetch existing project; create it if it doesn't exist yet
          PROJECT_JSON=$(curl -s "https://api.vercel.com/v9/projects/fund-flow-dashboard" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          if echo "$PROJECT_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if 'id' in d else 1)" 2>/dev/null; then
            PROJECT_ID=$(echo "$PROJECT_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
            echo "Found existing project: $PROJECT_ID"
          else
            echo "Project not found — creating..."
            CREATE_JSON=$(curl -sf -X POST "https://api.vercel.com/v9/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"fund-flow-dashboard","framework":"nextjs"}')
            PROJECT_ID=$(echo "$CREATE_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
            echo "Created project: $PROJECT_ID"
          fi

          echo "org_id=$ORG_ID"       >> $GITHUB_OUTPUT
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      # ── Production deploy (merge to main) ─────────────────────
      - name: Deploy to Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.vercel_ids.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.vercel_ids.outputs.project_id }}
        run: |
          set -euo pipefail
          vercel deploy --prod --token="$VERCEL_TOKEN" > /tmp/deploy.log 2>&1 \
            || { echo "=== Vercel output ==="; cat /tmp/deploy.log; exit 1; }
          cat /tmp/deploy.log
          DEPLOY_URL=$(grep -E '^https://' /tmp/deploy.log | tail -1)
          echo "✅ Production: $DEPLOY_URL"

      # ── Preview deploy (every PR) ──────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.vercel_ids.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ steps.vercel_ids.outputs.project_id }}
        run: |
          set -euo pipefail
          vercel deploy --token="$VERCEL_TOKEN" > /tmp/deploy.log 2>&1 \
            || { echo "=== Vercel output ==="; cat /tmp/deploy.log; exit 1; }
          cat /tmp/deploy.log
          PREVIEW_URL=$(grep -E '^https://' /tmp/deploy.log | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "🔍 Preview: $PREVIEW_URL"

      - name: Post deploy failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '(no log captured)';
            try { log = fs.readFileSync('/tmp/deploy.log', 'utf8').slice(-3000); } catch(e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Deploy failed — debug log\n\`\`\`\n${log}\n\`\`\``
            });

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🚀 Preview Deployment Ready',
                '',
                `**URL:** ${previewUrl}`,
                '',
                `**Branch:** \`${context.payload.pull_request.head.ref}\``,
                `**Commit:** ${context.payload.pull_request.head.sha.slice(0, 7)}`,
              ].join('\n')
            });
