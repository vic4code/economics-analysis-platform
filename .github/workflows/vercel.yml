name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN secret is missing."
            echo "::error::Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: VERCEL_TOKEN  |  Value: your token from vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN is set"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Vercel token + show account
        id: vercel_auth
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== vercel whoami ==="
          WHOAMI=$(vercel whoami --token="$VERCEL_TOKEN" 2>&1) || {
            echo "::error::VERCEL_TOKEN is invalid or expired — regenerate at vercel.com/account/tokens"
            echo "$WHOAMI"
            exit 1
          }
          echo "Logged in as: $WHOAMI"
          echo "scope=$WHOAMI" >> $GITHUB_OUTPUT

      - name: Link project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== vercel link ==="
          vercel link --yes --token="$VERCEL_TOKEN" 2>&1
          echo "✅ Project linked"
          cat .vercel/project.json 2>/dev/null || echo "(no project.json yet)"

      # ── Production deploy (merge to main) ─────────────────────
      - name: Deploy to Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== vercel deploy --prod ==="
          OUTPUT=$(vercel deploy --prod --token="$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -E '^https://' | tail -1)
          echo "✅ Production: $DEPLOY_URL"

      # ── Preview deploy (every PR) ──────────────────────────────
      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== vercel deploy (preview) ==="
          OUTPUT=$(vercel deploy --token="$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -E '^https://' | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "🔍 Preview: $PREVIEW_URL"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🚀 Preview Deployment Ready',
                '',
                `**URL:** ${previewUrl}`,
                '',
                `**Branch:** \`${context.payload.pull_request.head.ref}\``,
                `**Commit:** ${context.payload.pull_request.head.sha.slice(0, 7)}`,
              ].join('\n')
            });
